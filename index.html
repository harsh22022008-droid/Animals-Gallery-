        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;

        }

        body {

            background: linear-gradient(90deg, rgb(255, 0, 0), rgba(255, 255, 0, 0.766), rgb(0, 174, 255));

        }

        .navbar {
            height: 50px;
            width: 100%;
            background: rgba(255, 255, 255, 0.186);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 0px 0px 16px 16px;
            box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.544);
            display: flex;
            justify-content: space-between;
        }

        .logoBox {
            width: 260px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.055);
            border-radius: 0px 16px 16px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.544);
            display: flex;
            justify-content: space-between;
            gap: 5px;

        }

        .logoBox:hover {
            color: white;
            font-weight: 900;
            border-bottom: 3px solid white;
            border-radius: 16px;
            box-shadow: -5px 5px 5px rgba(0, 0, 0, 0.544);
        }

        .logo {
            height: 60px;
            width: 60px;
            background-size: cover;
            background-image: url(Copilot_20260705_233416.png);
            align-self: center;
        }


        .contact {
            height: 45px;
            width: 520px;
            background-color: rgba(255, 255, 255, 0.053);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px 0px 16px 16px;
            box-shadow: -5px 5px 5px rgba(0, 0, 0, 0.544);
            display: flex;
            justify-content: center;
            align-items: center
        }

        .contact a {
            text-decoration: none;
            color: black;
            margin-right: 12px;
            padding: 8px;
        }

        .contact a:hover {
            color: white;
            font-weight: 900;
            border-bottom: 3px solid white;
            border-radius: 16px;
            box-shadow: -5px 5px 5px rgba(0, 0, 0, 0.544);
        }

        .carousel {
            margin: 1px auto;
            height: 300px;
            width: 100%;
            border: 5px solid rgba(0, 0, 0, 0.021);
            display: flex;
            overflow-x: auto;
            border-radius: 20px;
            box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.544);
            background-color: transparent;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        .group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1em;
            animation: spin 5s infinite linear;
            padding-right: 1em;
        }

        .row2 {
            animation: spin 5s infinite linear;
        }


        .card {
            /* flex: 0 0 5em; */
            height: 280px;
            width: 280px;
            /* font-size: 35px; */
            padding: 1px;
            ;
            background: linear-gradient(130deg, rgba(255, 255, 255, 0.216), rgba(255, 255, 255, 0.207));
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            align-content: center;
            box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.544);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card:hover {
            border: 2px solid rgb(255, 255, 255);
            box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.982);
        }

        @keyframes spin {
            from {
                translate: 0px;
            }

            to {
                translate: -100%;
            }
        }

        .image {
            height: 275px;
            width: 275px;
            border-radius: 16px;
            background-color: white;
            background-size: cover;
            image-resolution: inherit;
        }
    </style>
